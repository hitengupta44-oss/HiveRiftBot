<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveRift | AI Intelligence Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --bg-white: #f4f7f4;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            --scrollbar-bg: #f1f1f1;
            --scrollbar-thumb: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Urbanist', sans-serif;
        }

        body {
            background-color: var(--bg-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(46, 204, 113, 0.1);
        }

        .chat-header {
            padding: 25px 40px;
            background: var(--white);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-brand h2 {
            font-weight: 700;
            font-size: 22px;
            color: var(--text-main);
        }

        .header-brand h2 span {
            color: var(--primary-green);
        }

        .header-brand p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            background: #e8f8ef;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary-green);
        }

        /* Messages Container with Side Scroller */
        .messages-container {
            flex: 1;
            padding: 30px 40px;
            overflow-y: scroll;
            /* Forces vertical scroll presence */
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #ffffff;
            scrollbar-width: thin;
            /* Firefox support */
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-bg);
            /* Firefox support */
        }

        /* Webkit Scrollbar Styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: var(--scrollbar-bg);
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
            transition: background 0.3s;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .msg {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.bot {
            align-self: flex-start;
            background: #f8faf9;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(46, 204, 113, 0.1);
        }

        .msg.user {
            align-self: flex-end;
            background: var(--primary-green);
            color: var(--white);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .input-wrapper {
            padding: 25px 40px;
            background: var(--white);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .input-container {
            background: #f1f3f1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 6px 10px;
            transition: all 0.3s ease;
        }

        .input-container:focus-within {
            background: var(--white);
            box-shadow: 0 0 0 2px var(--primary-green);
        }

        .input-container input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 15px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
        }

        .send-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .chat-wrapper {
                height: 100vh;
                border-radius: 0;
            }

            .chat-header,
            .messages-container,
            .input-wrapper {
                padding: 15px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="chat-wrapper">
        <header class="chat-header">
            <div class="header-brand">
                <h2>Hive<span>Rift</span></h2>
                <p>Support Assistant</p>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Secure Connection</span>
            </div>
        </header>

        <div class="messages-container" id="chatWindow">
            <div class="msg bot">
                Hello! I am the <strong>HiveRift Support Assistant</strong>. <br><br>
                I can provide verified information regarding our web packages, custom software pricing, and internal
                sales protocols. How can I help you today?
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Type your inquiry here..."
                    onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://beastzzz-hiveriftbot.hf.space";
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        let isWaiting = false;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === "" || isWaiting) return;

            addMessage(text, 'user');
            userInput.value = "";
            isWaiting = true;

            const loadingId = addMessage("Analyzing internal records...", 'bot');

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text }),
                });

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                addMessage(data.reply, 'bot');
            } catch (err) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                addMessage("⚠️ Could not reach the server. Please make sure the backend is running.", 'bot');
            } finally {
                isWaiting = false;
            }
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerHTML = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>

</html>
